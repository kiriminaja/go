name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  update-pkg-go-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Update pkg.go.dev
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            GOPROXY=https://proxy.golang.org go list -m github.com/kiriminaja/go@${GITHUB_REF_NAME} && exit 0
            echo "Failed, retrying in 15s..."
            sleep 15
          done
          echo "All attempts failed"
          exit 1
